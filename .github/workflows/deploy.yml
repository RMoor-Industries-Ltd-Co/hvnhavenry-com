name: Deploy to Calculus-Havenry

on:
  pull_request:
  push:
    branches: [main]

# main deploys stay strictly serial and uncancellable; PRs validate in
# parallel, cancelling their own superseded runs.
concurrency:
  group: ${{ github.ref == 'refs/heads/main' && 'deploy-hvnhavenry' || format('validate-{0}', github.ref) }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Build & deploy
    needs: validate
    # Validate runs on PRs for pre-merge feedback; only deploy on a push to main.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GDRIVE_CLIENT_ID: ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET: ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          # Pass the Doppler-synced Drive creds through to the SSH session so the
          # deploy can write them into the container's runtime env file.
          envs: GDRIVE_CLIENT_ID,GDRIVE_CLIENT_SECRET,GDRIVE_REFRESH_TOKEN
          script: |
            set -e
            cd /srv/hvnhavenry
            git fetch origin main
            git reset --hard origin/main

            # Ensure the container's runtime env carries the Drive creds so the
            # startup asset-pull runs hands-free. Upsert idempotently, and only
            # when a value is actually present — never overwrite a good value
            # with an empty one (e.g. if a secret isn't synced to this workflow).
            touch .env.local
            upsert_env() {
              key="$1"; val="$2"
              [ -z "$val" ] && return 0
              grep -v "^${key}=" .env.local > .env.local.tmp 2>/dev/null || true
              printf '%s=%s\n' "$key" "$val" >> .env.local.tmp
              mv .env.local.tmp .env.local
            }
            upsert_env GDRIVE_CLIENT_ID "$GDRIVE_CLIENT_ID"
            upsert_env GDRIVE_CLIENT_SECRET "$GDRIVE_CLIENT_SECRET"
            upsert_env GDRIVE_REFRESH_TOKEN "$GDRIVE_REFRESH_TOKEN"

            docker compose build app
            # force-recreate so the container picks up the refreshed env file and
            # re-runs the startup asset pull on every deploy.
            docker compose up -d --no-deps --force-recreate app
            docker compose up -d nginx
            docker image prune -f
            echo "✓ Deployed at $(date)"
