services:
  app:
    build: .
    container_name: hvnhavenry_app
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env.local
    depends_on:
      - db
    networks:
      - havenry

  # Backs Vale's interaction log + scheduled HVN<->AMG report cache (src/lib/db.ts).
  # Nothing else on this site is stateful -- the marketing pages/assets pipeline never
  # touch this database.
  db:
    image: postgres:16-alpine
    container_name: hvnhavenry_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hvnhavenry
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-havenry_dev_only}
      POSTGRES_DB: hvnhavenry
    volumes:
      - hvnhavenry_db_data:/var/lib/postgresql/data
    networks:
      - havenry

  nginx:
    image: nginx:alpine
    container_name: hvnhavenry_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - havenry

networks:
  havenry:
    driver: bridge

volumes:
  hvnhavenry_db_data:
