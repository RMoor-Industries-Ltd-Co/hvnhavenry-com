worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=hvn:10m rate=30r/s;

    # Redirect all HTTP → HTTPS
    server {
        listen 80;
        server_name hvnhavenry.com www.hvnhavenry.com;
        return 301 https://hvnhavenry.com$request_uri;
    }

    # Redirect www → apex
    server {
        listen 443 ssl;
        server_name www.hvnhavenry.com;

        ssl_certificate     /etc/letsencrypt/live/hvnhavenry.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hvnhavenry.com/privkey.pem;

        return 301 https://hvnhavenry.com$request_uri;
    }

    # Main site
    server {
        listen 443 ssl;
        server_name hvnhavenry.com;

        ssl_certificate     /etc/letsencrypt/live/hvnhavenry.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hvnhavenry.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Static assets — long cache. proxy_hide_header drops Next's own
        # `Cache-Control: max-age=0` so ours actually wins.
        location /_next/static/ {
            proxy_pass http://app:3000;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Pulled Drive assets (images/video) are served from Next's public dir at
        # /assets/*. Filenames are stable, so cache them hard for fast repeat loads.
        location /assets/ {
            proxy_pass http://app:3000;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=2592000";
        }

        # Everything else → Next.js
        location / {
            limit_req zone=hvn burst=50 nodelay;

            proxy_pass         http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
